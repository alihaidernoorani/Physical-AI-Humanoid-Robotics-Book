<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Ear panels -->
  <rect x="10" y="40" width="9" height="22" rx="3" fill="#2563eb"/>
  <rect x="81" y="40" width="9" height="22" rx="3" fill="#2563eb"/>
  <circle cx="14.5" cy="46" r="2" fill="#38bdf8"/>
  <circle cx="14.5" cy="56" r="2" fill="#38bdf8"/>
  <circle cx="85.5" cy="46" r="2" fill="#38bdf8"/>
  <circle cx="85.5" cy="56" r="2" fill="#38bdf8"/>
  <!-- Main head -->
  <rect x="19" y="27" width="62" height="52" rx="9" fill="#2563eb"/>
