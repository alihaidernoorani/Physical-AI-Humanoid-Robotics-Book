  <rect x="27" y="62" width="46" height="10" rx="4" fill="#0f172a"/>
  <rect x="31" y="65" width="7" height="4" rx="1.5" fill="#38bdf8"/>
  <rect x="42" y="65" width="7" height="4" rx="1.5" fill="#38bdf8"/>
